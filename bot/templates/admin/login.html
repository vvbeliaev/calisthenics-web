<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Caliathletics Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --surface-2: #1a1a1a;
      --border: rgba(255,255,255,0.06); --border-2: rgba(255,255,255,0.10);
      --text: #e8e8e8; --text-dim: rgba(255,255,255,0.40);
      --accent: #c8ff00; --accent-dim: rgba(200,255,0,0.12);
      --red: #ff3d3d;
      --display: 'Bebas Neue', Impact, sans-serif;
      --mono: 'IBM Plex Mono', ui-monospace, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: grid;
      place-items: center;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    /* background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.5;
    }

    /* grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    /* diagonal accent line */
    .diag {
      position: fixed;
      top: -20%;
      right: 15%;
      width: 2px;
      height: 140%;
      background: linear-gradient(180deg, transparent, var(--accent), transparent);
      transform: rotate(25deg);
      opacity: 0.08;
    }

    .card {
      width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      z-index: 1;
      animation: cardIn 0.5s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent);
    }

    .card-head {
      padding: 32px 32px 24px;
      border-bottom: 1px solid var(--border);
    }
    .brand {
      font-family: var(--display);
      font-size: 32px;
      letter-spacing: 0.06em;
      color: var(--accent);
      line-height: 1;
    }
    .card-head h1 {
      font-family: var(--display);
      font-size: 24px;
      letter-spacing: 0.04em;
      margin-top: 8px;
      color: var(--text);
    }
    .card-head p {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .card-body { padding: 28px 32px 32px; }

    .error {
      background: rgba(255,61,61,0.06);
      border: 1px solid rgba(255,61,61,0.2);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 20px;
    }

    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 4px;
      color: var(--text);
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .field input::placeholder { color: var(--text-dim); }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover {
      filter: brightness(1.1);
      box-shadow: 0 0 20px rgba(200,255,0,0.2);
    }
    .btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="diag"></div>
  <div class="card">
    <div class="card-head">
      <div class="brand">CALIATHLETICS</div>
      <h1>Admin Panel</h1>
      <p>Введите пароль для входа</p>
    </div>
    <div class="card-body">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/admin/login">
        <div class="field">
          <label>Пароль</label>
          <input type="password" name="password" autofocus placeholder="••••••••">
        </div>
        <button type="submit" class="btn">Войти</button>
      </form>
    </div>
  </div>
</body>
</html>
