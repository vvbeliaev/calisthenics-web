<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Caliathletics Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #06100f; --surface: #0c1e1b; --border: rgba(255,255,255,0.08);
      --border-2: rgba(255,255,255,0.14); --text: #f0f4f3; --muted: rgba(240,244,243,0.45);
      --orange: #ff8400; --gold: #ffd500; --red: #e74c3c;
      --mono: 'JetBrains Mono', monospace; --sans: 'Syne', system-ui, sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .card {
      width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .card-head {
      padding: 28px 28px 22px;
      border-bottom: 1px solid var(--border);
    }
    .brand {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--orange), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .card-head h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
    .card-head p  { font-size: 12.5px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
    .card-body { padding: 24px 28px; }
    .error {
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.3);
      color: var(--red);
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 12.5px;
      font-family: var(--mono);
      margin-bottom: 16px;
    }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-family: var(--mono); margin-bottom: 6px; }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-2);
      border-radius: 6px;
      color: var(--text);
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--orange); }
    .btn {
      width: 100%;
      padding: 11px;
      background: var(--orange);
      color: #000;
      border: none;
      border-radius: 6px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: filter 0.15s;
    }
    .btn:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-head">
      <div class="brand">Caliathletics</div>
      <h1>Admin Panel</h1>
      <p>Введите пароль для входа</p>
    </div>
    <div class="card-body">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/admin/login">
        <div class="field">
          <label>Пароль</label>
          <input type="password" name="password" autofocus placeholder="••••••••">
        </div>
        <button type="submit" class="btn">Войти</button>
      </form>
    </div>
  </div>
</body>
</html>
